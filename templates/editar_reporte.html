{% extends "base.html" %}

{% block title %}
Editar Reporte | SIS-UNETI
{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header">
        <h2>✏️ Editar Reporte</h2>
    </div>
    <div class="card-body">
        {% if error %}
            <div class="alerta-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" name="titulo" class="form-control" value="{{ reporte.titulo }}" required>
            </div>
            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" class="form-control" rows="5" required>{{ reporte.descripcion }}</textarea>
            </div>
            <!-- ✅ CAMPO TIPO AGREGADO -->
            <div class="form-group">
                <label for="tipo">Tipo de Reporte</label>
                <select id="tipo" name="tipo" class="form-control" required>
                    <option value="Académico" {% if reporte.tipo == "Académico" %}selected{% endif %}>Académico</option>
                    <option value="Disciplinario" {% if reporte.tipo == "Disciplinario" %}selected{% endif %}>Disciplinario</option>
                    <option value="Administrativo" {% if reporte.tipo == "Administrativo" %}selected{% endif %}>Administrativo</option>
                    <option value="Otro" {% if reporte.tipo == "Otro" %}selected{% endif %}>Otro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fecha_generacion">Fecha de Generación</label>
                <input type="date" id="fecha_generacion" name="fecha_generacion" class="form-control" value="{{ reporte.fecha_generacion }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Actualizar Reporte</button>
            <a href="{{ url_for('reportes') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>

{% endblock %}
